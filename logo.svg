<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Shield background -->
  <defs>
    <linearGradient id="shieldGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a3d1f"/>
      <stop offset="100%" stop-color="#051a0d"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f5c842"/>
      <stop offset="100%" stop-color="#d4a017"/>
    </linearGradient>
  </defs>

  <!-- Outer shield -->
  <path d="M100 8 L180 40 L180 110 Q180 160 100 192 Q20 160 20 110 L20 40 Z"
    fill="url(#shieldGrad)" stroke="url(#goldGrad)" stroke-width="4"/>

  <!-- Inner shield accent line -->
  <path d="M100 22 L168 50 L168 110 Q168 152 100 180 Q32 152 32 110 L32 50 Z"
    fill="none" stroke="#f5c842" stroke-width="1" opacity="0.3"/>

  <!-- Football icon top -->
  <circle cx="100" cy="58" r="22" fill="none" stroke="url(#goldGrad)" stroke-width="2.5"/>
  <circle cx="100" cy="58" r="7" fill="url(#goldGrad)"/>
  <!-- Pentagon lines on ball -->
  <path d="M100 36 L100 44 M84 47 L90 52 M116 47 L110 52 M88 70 L94 65 M112 70 L106 65"
    stroke="url(#goldGrad)" stroke-width="1.5" stroke-linecap="round"/>

  <!-- LACA text -->
  <text x="100" y="118"
    font-family="'Arial Black', 'Arial Bold', sans-serif"
    font-size="32"
    font-weight="900"
    fill="url(#goldGrad)"
    text-anchor="middle"
    letter-spacing="4">LACA</text>

  <!-- TV text -->
  <text x="100" y="145"
    font-family="'Arial Black', 'Arial Bold', sans-serif"
    font-size="20"
    font-weight="900"
    fill="#ffffff"
    text-anchor="middle"
    letter-spacing="8">TV</text>

  <!-- Bottom accent bar -->
  <rect x="55" y="152" width="90" height="3" rx="1.5" fill="url(#goldGrad)" opacity="0.8"/>
</svg>
